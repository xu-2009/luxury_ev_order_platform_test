<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沈阳建筑大学游泳馆课程服务系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="brand">Swimming Check-in and Feedback System</div>
            <h1>沈阳建筑大学游泳馆课程服务系统</h1>
            <p class="subtitle">签到、反馈与到馆指引一体化服务</p>
        </div>
    </header>

    <main class="container">
        <section class="hero-card">
            <h2>欢迎使用课程服务系统</h2>
            <p>
                本系统面向前来参加游泳课程的学员，当前版本提供签到打卡、用户反馈和到馆导航说明等基础功能，
                便于线下教学服务快速开展。
            </p>
            <div class="button-grid">
                <a class="button primary" href="{{ url_for('checkin') }}">学员签到</a>
                <a class="button" href="{{ url_for('feedback') }}">用户反馈</a>
                <a class="button" href="{{ url_for('navigation') }}">到馆导航</a>
                <a class="button" href="{{ url_for('admin') }}">管理查看</a>
            </div>
        </section>

        <section class="feature-grid">
            <div class="card">
                <h3>快速签到</h3>
                <p>支持学员提交姓名、电话和课程信息，现场快速完成签到记录。</p>
            </div>
            <div class="card">
                <h3>意见反馈</h3>
                <p>支持提交课程体验、服务建议和满意度评分，方便后续持续优化。</p>
            </div>
            <div class="card">
                <h3>到馆说明</h3>
                <p>当前版本提供文字指引，后续将接入地图或校内导航入口。</p>
            </div>
        </section>
    </main>
</body>
</html>
